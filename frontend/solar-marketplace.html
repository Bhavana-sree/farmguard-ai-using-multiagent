<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmGuard AI - Solar Credit Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar {
            background: white;
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .nav-left { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }

        .nav-arrows { 
            display: flex; 
            gap: 10px; 
        }

        .nav-arrow {
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            background: #f0f8f0; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            cursor: pointer; 
            font-size: 20px;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            color: #2e7d32;
        }
        .nav-arrow:hover { 
            background: #2e7d32; 
            color: white; 
        }

        .home-icon { 
            font-size: 28px; 
            cursor: pointer; 
            transition: transform 0.3s;
            text-decoration: none;
            color: #2e7d32;
        }
        .home-icon:hover {
            transform: scale(1.1);
        }

        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }

        .profile-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: #f0f8f0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #2e7d32;
        }
        .profile-badge:hover { 
            background: #2e7d32; 
            color: white; 
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #ff9800;
            font-size: 28px;
        }

        .market-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 25px;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .tab:hover {
            border-color: #ff9800;
        }

        .tab.active {
            background: #ff9800;
            color: white;
        }

        .tab.solar {
            background: #ff9800;
            color: white;
        }

        .tab.farmer {
            background: #2e7d32;
            color: white;
        }

        .marketplace-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .offers-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            color: #ff9800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .offer-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .offer-card:hover {
            border-color: #ff9800;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,152,0,0.1);
        }

        .offer-type {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .type-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
        }

        .type-solar {
            background: #ff9800;
            color: white;
        }

        .type-farmer {
            background: #2e7d32;
            color: white;
        }

        .offer-info h4 {
            margin-bottom: 5px;
        }

        .offer-info p {
            font-size: 12px;
            color: #666;
        }

        .offer-details {
            text-align: right;
        }

        .offer-price {
            font-size: 24px;
            font-weight: bold;
            color: #ff9800;
        }

        .offer-credits {
            font-size: 14px;
            color: #666;
            margin: 5px 0;
        }

        .offer-match {
            background: #4caf50;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        .sell-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .sell-btn:hover {
            background: #f57c00;
            transform: scale(1.05);
        }

        .listings-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .listing-card {
            background: linear-gradient(135deg, #fff3e0, #ffffff);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #ff9800;
        }

        .listing-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .listing-type {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 20px;
            background: #ff9800;
            color: white;
        }

        .listing-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .listing-credits {
            font-size: 18px;
            font-weight: bold;
            color: #ff9800;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff9800;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar with Navigation Arrows -->
        <div class="navbar">
            <div class="nav-left">
                <div class="nav-arrows">
                    <a href="javascript:history.back()" class="nav-arrow" title="Go Back">←</a>
                    <a href="javascript:history.forward()" class="nav-arrow" title="Go Forward">→</a>
                </div>
                <a href="index.html" class="home-icon" title="Go to Home">🏠</a>
            </div>
            <div class="nav-right">
                <a href="solar-profile.html" class="profile-badge">
                    <span>☀️</span>
                    <span>Solar Profile</span>
                </a>
            </div>
        </div>

        <div class="header">
            <h1>🏪 Carbon Credit Marketplace</h1>
            <div class="market-tabs">
                <span class="tab solar active" onclick="filterMarket('all')">All Credits</span>
                <span class="tab" onclick="filterMarket('solar')">Solar Credits</span>
                <span class="tab farmer" onclick="filterMarket('farmer')">Tree Credits</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="avgPrice">₹860</div>
                <div class="stat-label">Average Price</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="availableCredits">1,245</div>
                <div class="stat-label">Available Credits</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="yourCredits">6.58</div>
                <div class="stat-label">Your Credits</div>
            </div>
        </div>

        <div class="marketplace-grid">
            <div class="offers-section">
                <div class="section-header">
                    <div class="section-title">
                        <span>🤝</span>
                        <h3>Buy Offers</h3>
                    </div>
                </div>

                <div id="buyOffers"></div>
            </div>

            <div class="listings-section">
                <div class="section-title">
                    <span>📋</span>
                    <h3>Your Listings</h3>
                </div>

                <div id="yourListings"></div>

                <button class="sell-btn" style="width: 100%; margin-top: 20px;" onclick="createListing()">
                    ➕ Create New Listing
                </button>
            </div>
        </div>

        <div class="footer">
            <p>FarmGuard AI • Unified Carbon Marketplace • Solar & Tree Credits</p>
        </div>
    </div>

    <script>
        const solarId = localStorage.getItem('solarId') || 1;
        let currentFilter = 'all';

        window.onload = function() {
            loadMarketplaceData();
            loadYourCredits();
        };

        async function loadMarketplaceData() {
            // Mock data combining both solar and tree credits
            const offers = [
                {
                    type: 'solar',
                    company: 'GreenTech Corp',
                    description: 'Solar Credits from 5kW installation',
                    price: 890,
                    credits: 100,
                    match: 95
                },
                {
                    type: 'solar',
                    company: 'EcoFuture Ltd',
                    description: 'Clean energy credits',
                    price: 920,
                    credits: 50,
                    match: 88
                },
                {
                    type: 'farmer',
                    company: 'CarbonClear',
                    description: 'Agroforestry project',
                    price: 870,
                    credits: 200,
                    match: 82
                },
                {
                    type: 'farmer',
                    company: 'Sustainable Inc',
                    description: 'Mango plantation',
                    price: 850,
                    credits: 150,
                    match: 79
                }
            ];

            displayOffers(offers);
        }

        function displayOffers(offers) {
            const container = document.getElementById('buyOffers');
            let html = '';

            offers.filter(o => currentFilter === 'all' || o.type === currentFilter).forEach(offer => {
                html += `
                    <div class="offer-card">
                        <div class="offer-type">
                            <div class="type-icon type-${offer.type}">${offer.type === 'solar' ? '☀️' : '🌳'}</div>
                            <div class="offer-info">
                                <h4>${offer.company}</h4>
                                <p>${offer.description}</p>
                            </div>
                        </div>
                        <div class="offer-details">
                            <div class="offer-price">₹${offer.price}</div>
                            <div class="offer-credits">Needs ${offer.credits} credits</div>
                            <div class="offer-match">${offer.match}% match</div>
                        </div>
                        <button class="sell-btn" onclick="sellTo('${offer.company}', ${offer.price})">Sell</button>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function loadYourCredits() {
            try {
                // Mock credits
                const data = { carbon_credits: 6.58 };
                document.getElementById('yourCredits').textContent = data.carbon_credits?.toFixed(2) || '6.58';
                displayYourListings(data.carbon_credits || 6.58);
            } catch (error) {
                displayYourListings(6.58);
            }
        }

        function displayYourListings(credits) {
            const container = document.getElementById('yourListings');
            
            container.innerHTML = `
                <div class="listing-card">
                    <div class="listing-header">
                        <span class="listing-type">Solar Credits</span>
                        <span style="font-size: 12px; color: #666;">ID: SOL-001</span>
                    </div>
                    <div class="listing-details">
                        <div>
                            <div class="listing-credits">${credits.toFixed(2)} Credits</div>
                            <div style="font-size: 12px; color: #666;">5kW Solar Array</div>
                        </div>
                        <div>
                            <div style="font-size: 16px; font-weight: bold; color: #ff9800;">₹${(credits * 860).toFixed(0)}</div>
                            <div style="font-size: 11px; color: #999;">est. value</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="sell-btn" style="flex: 1;" onclick="sellCredits()">Sell Now</button>
                        <button class="sell-btn" style="flex: 1; background: #4caf50;" onclick="splitCredits()">Split</button>
                    </div>
                </div>
            `;
        }

        function filterMarket(type) {
            currentFilter = type;
            loadMarketplaceData();
            
            // Update tab styling
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function sellTo(company, price) {
            const credits = 6.58;
            const total = credits * price;
            if (confirm(`Sell ${credits.toFixed(2)} solar credits to ${company} for ₹${total.toFixed(0)}?`)) {
                alert('✅ Transaction initiated! Credits will be transferred upon verification.');
            }
        }

        function createListing() {
            alert('Create custom listing:\nEnter price per credit and listing duration');
        }

        function sellCredits() {
            sellTo('Market', 860);
        }

        function splitCredits() {
            const amount = prompt('How many credits would you like to list?', '1.0');
            if (amount) {
                alert(`✅ ${amount} credits listed for sale at market price!`);
            }
        }
    </script>
</body>
</html>
