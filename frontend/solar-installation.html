<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmGuard AI - Installation Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .navbar {
            background: white;
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-arrows { display: flex; gap: 10px; }
        .nav-arrow {
            width: 40px; height: 40px; border-radius: 50%;
            background: #f0f8f0; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 20px;
            text-decoration: none; color: #2e7d32;
        }
        .nav-arrow:hover { background: #2e7d32; color: white; }
        .home-icon { font-size: 28px; cursor: pointer; text-decoration: none; color: #2e7d32; }
        .home-icon:hover { transform: scale(1.1); }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header h1 {
            color: #ff9800;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 0 20px;
        }

        .progress-step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .progress-step::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 3px;
            background: #e0e0e0;
            z-index: 1;
        }

        .progress-step:first-child::before { left: 50%; }
        .progress-step:last-child::before { right: 50%; }

        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: white;
            border: 3px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            position: relative;
            z-index: 2;
            font-weight: bold;
        }

        .progress-step.completed .step-circle {
            background: #ff9800;
            border-color: #ff9800;
            color: white;
        }

        .progress-step.active .step-circle {
            border-color: #ff9800;
            color: #ff9800;
        }

        .form-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff9800;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        .btn-primary {
            background: #ff9800;
            color: white;
        }

        .btn-primary:hover {
            background: #f57c00;
        }

        .btn-secondary {
            background: white;
            color: #ff9800;
            border: 2px solid #ff9800;
        }

        .btn-secondary:hover {
            background: #fff3e0;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="nav-left">
                <div class="nav-arrows">
                    <a href="javascript:history.back()" class="nav-arrow">←</a>
                    <a href="javascript:history.forward()" class="nav-arrow">→</a>
                </div>
                <a href="index.html" class="home-icon">🏠</a>
            </div>
        </div>

        <div class="header">
            <h1>🔧 Installation Details</h1>
            <p>Step 2 of 4: Tell us about your solar setup</p>
        </div>

        <div class="progress-bar">
            <div class="progress-step completed">
                <div class="step-circle">✓</div>
                <div>Register</div>
            </div>
            <div class="progress-step active">
                <div class="step-circle">2</div>
                <div>Installation</div>
            </div>
            <div class="progress-step">
                <div class="step-circle">3</div>
                <div>Estimate</div>
            </div>
            <div class="progress-step">
                <div class="step-circle">4</div>
                <div>Verify</div>
            </div>
        </div>

        <div class="form-card">
            <form id="installationForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Plant Capacity (kW)</label>
                        <input type="number" id="capacity" step="0.1" value="5.0" required>
                    </div>

                    <div class="form-group">
                        <label>Installation Date</label>
                        <input type="date" id="installDate" value="2026-01-15" required>
                    </div>

                    <div class="form-group">
                        <label>Panel Type</label>
                        <select id="panelType">
                            <option value="Monocrystalline">Monocrystalline</option>
                            <option value="Polycrystalline">Polycrystalline</option>
                            <option value="Thin-film">Thin-film</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Inverter Type</label>
                        <input type="text" id="inverterType" value="Grid-Tie" required>
                    </div>

                    <div class="form-group">
                        <label>Panel Count</label>
                        <input type="number" id="panelCount" value="12" required>
                    </div>

                    <div class="form-group">
                        <label>Total Area (m²)</label>
                        <input type="number" id="area" step="0.1" value="48" required>
                    </div>

                    <div class="form-group">
                        <label>Tilt Angle (degrees)</label>
                        <input type="number" id="tilt" step="0.1" value="30">
                    </div>

                    <div class="form-group">
                        <label>Azimuth Angle</label>
                        <input type="number" id="azimuth" step="0.1" value="180">
                    </div>

                    <div class="form-group full-width">
                        <div class="checkbox-group">
                            <input type="checkbox" id="gridConnected" checked>
                            <label for="gridConnected">Grid Connected</label>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='solar-register.html'">Back</button>
                    <button type="button" class="btn btn-primary" onclick="nextStep()">Next: Get Estimate →</button>
                </div>
            </form>
        </div>

        <div class="footer">
            FarmGuard AI • Step 2 of 4
        </div>
    </div>

    <script>
        function nextStep() {
            const data = {
                capacity: document.getElementById('capacity').value,
                installDate: document.getElementById('installDate').value,
                panelType: document.getElementById('panelType').value,
                inverterType: document.getElementById('inverterType').value,
                panelCount: document.getElementById('panelCount').value,
                area: document.getElementById('area').value,
                tilt: document.getElementById('tilt').value,
                azimuth: document.getElementById('azimuth').value,
                gridConnected: document.getElementById('gridConnected').checked
            };
            
            localStorage.setItem('solarInstallation', JSON.stringify(data));
            window.location.href = 'solar-estimate.html';
        }
    </script>
</body>
</html>
